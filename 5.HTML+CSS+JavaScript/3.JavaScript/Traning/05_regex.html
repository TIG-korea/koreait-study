<body>
    <section class="login-section">
        <h2>로그인</h2>
        <div class="form-group">
            <label>아이디</label>
            <input type="text" id="login-id" placeholder="user 입력">
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" id="login-pw" placeholder="qwer1234! 입력">
        </div>
        <button id="btn-login" onclick="login()">로그인</button>
    </section>
    <script>
        //     <로그인>
        //      * 공통 : 비어있는 문자 불가(로그인 버튼 클릭 시)
        //      * const id = "user";   /  const pwd = "qwer1234!"
        //          - 아이디 또는 비밀번호를 입력하지 않을 경우 : alert "아이디 또는 비밀번호를 입력해주세요." 출력 
        //          - 아이디 또는 비밀번호가 일치하지 않을 경우 : alert "아이디 또는 비밀번호가 틀렸습니다." 출력
        //          - 위의 변수와 모두 일치 할 경우 : alert "로그인 되었습니다." 출력 

        function login(){
            const id = document.getElementById('login-id').value;
            const pwd = document.getElementById('login-pw').value;
            const pattern = /[a-zA-Z0-9!@#]+$/;

            if (id === "user" && pwd ==="qwer1234!"){
                alert("로그인 되었습니다");
                return;
            } else if(id ==="" || pwd ===""){
                alert("아이디 또는 비밀번호를 입력해주세요.");
                return;
            } else  { 
                alert("아이디 또는 비밀번호가 틀렸습니다");
            }
        }








    </script>


    <section class="portfolio-section">
        <h2>포트폴리오 추가</h2>
        <div class="form-group">
            <label>프로젝트 제목</label>
            <input type="text" id="port-title" placeholder="최대 100글자">
        </div>
        <div class="form-group">
            <label>설명</label>
            <textarea id="port-desc" placeholder="프로젝트 내용을 입력해주세요."></textarea>
        </div>
        <button id="btn-port" onclick="addProject()">새로운 프로젝트 추가하기</button>
        <div id="portfolio-list"></div>
    </section>
    <script>
        //     <포트폴리오>
        //      - 제목은 최대 100글자까지 가능
        //      - 제목이 100글자를 초과하면 alert "제목이 너무 깁니다."

        //      * 공통 : 비어있는 문자 불가(새로운 프로젝트 추가하기 버튼 클릭 시)
        //          - 제목이 비어있다면 alert "제목을 입력해주세요"
        //          - 설명이 비어있다면 alert "설명을 입력해주세요."

        //      * 추가하기 성공 시
        //          - 아래의 코드를 참고하여 내용을 추가하세요. (클래스 및 텍스트 노드 추가)
        //             item.className = 'portfolio-item';
        //             item.innerHTML = `<strong>${portTitle.value}</strong><p style="margin:5px 0 0; font-size:0.9rem;">${portDesc.value}</p>`;

        function addProject(){
            const title = document.getElementById('port-title').value;
            const desc = document.getElementById('port-desc').value;
            const list = document.getElementById('portfolio-list');
            const pattern = /[a-zA-Z0-9!@#]+{,101}$/;

            if (title === ""){
                alert("제목을 입력해주세요");
                return;
            } else if(desc === ""){
                alert("설명을 입력해주세요");
                return;
            }
            if(title.length > 100){
                alert("제목이 너무 깁니다.");
                return;
            }

            const item = document.createElement('div');
            item.className = 'portfolio-item';

            item.innerHTML = `<strong>${title}</strong><p style="margin:5px 0 0; font-size:0.9rem;">${desc}</p>`;

            list.appendChild(item);

        }









    </script>


    <section class="contact-section">
        <h2>연락하기</h2>
        <div class="form-group">
            <label>이름</label>
            <input type="text" id="contact-name" placeholder="한글 이름">
        </div>
        <div class="form-group">
            <label>이메일</label>
            <input type="email" id="contact-email" placeholder="example@test.com">
        </div>
        <div class="form-group">
            <label>메시지</label>
            <textarea id="contact-msg" maxlength="500" placeholder="메시지를 입력해 주세요 (최대 500자)" oninput ="Countmsg()"></textarea>
            <div class="char-count"><span id="msg-count">0</span> / 500</div>
        </div>
        <button id="btn-contact" onclick="send()">전송</button>
    </section>
    <script>
        //     <연락하기>
        //      - 이름 : 한글만 가능
        //      - 이메일 : 이메일 주소가 유효한지 확인   ex) test@test.com
        //      - 메시지 : 사용자가 입력한 글자를 실시간으로 업데이트 / 최대 500글자까지 사용 가능

        //      * 전송 버튼 클릭 시
        //          - 이름에 한글말고 다른게 있으면 alert "이름은 한글만 사용 가능합니다"
        //          - 이메일 주소가 유효하지 않으면 alert "이메일 양식이 유효하지 않습니다."

        //     * 공통 : 비어있는 문자 불가(전송 버튼 클릭 시)
        //          - 이름이 비어있다면 alert "이름을 입력해주세요"
        //          - 이메일이 비어있다면 alert "이메일을 입력해주세요."
        //          - 메시지가 비어있다면 alert "메시지를 입력해주세요."

        function send(){
            const name = document.getElementById('contact-name').value;
            const email = document.getElementById('contact-email').value;
            const msg = document.getElementById('contact-msg').value;
            const namePattern = /^[ㄱ-ㅎ가-힣]+$/;
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
            const msgPattern = /^[ㄱ-ㅎ가-힣a-zA-Z0-9!@#]+{,501}$/;
            let msglength = document.getElementById('msg-count');
            msglength = msg.length;

            if(!namePattern.test(name)){
                alert("이름은 한글만 사용 가능합니다")
                return;
            } 
            if(!emailPattern.test(email)){
                alert("이메일 양식이 유효하지 않습니다.")
                return;
            }
            
            if(name === "") {
                alert("이름을 입력해주세요")
                return;
            }
            if(email === "") {
                alert("이메일을 입력해주세요")
                return;
            }
            if(msg === "") {
                alert("메시지를 입력해주세요")
                return;
            }


        }






    </script>


    <section class="join-section">
        <h2>회원가입</h2>
        <div class="form-group">
            <label>이름</label>
            <input type="text" id="join-name" placeholder="한글만 입력" onkeyup="keyboardFunc()">
            <div id="msg-name" class="msg"></div>
        </div>
        <div class="form-group">
            <label>아이디</label>
            <input type="text" id="join-id" placeholder="5~20자 영문, 숫자, _, -">
            <div id="msg-id" class="msg"></div>
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" id="join-pw" placeholder="8~16자 대소문자/특수/숫자 포함">
            <div id="msg-pw" class="msg"></div>
        </div>
        <div class="form-group">
            <label>비밀번호 확인</label>
            <input type="password" id="join-pw2" placeholder="비밀번호 재입력">
            <div id="msg-pw2" class="msg"></div>
        </div>
        <button id="btn-join" onclick="join()">회원 가입</button>
    </section>
    <script>

        function join(){
            const name = document.getElementById('join-name').value;
            const nameMsg = document.getElementById('msg-name');
            const id = document.getElementById('join-id').value;
            const idMsg = document.getElementById('msg-id');
            const pw = document.getElementById('join-pw').value;
            const pwMsg = document.getElementById('msg-pw');
            const pw2 = document.getElementById('join-pw2').value;
            const pw2Msg = document.getElementById('msg-pw2');
            const namePattern = /^[ㄱ-ㅎ가-힣]+$/;
            const idPattern = /^[a-zA-Z0-9_-]{5,20}$/;
            const pwPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,16}$/;

            

        //     <회원가입>
        //      - 이름 : 한글만 가능
        //      - 아이디 : 영어, 숫자, 특수기호(_),(-)만 가능 / 5자 이상 20자 이하
        //      - 비밀번호 : 대소문자 또는 특수문자, 숫자 최소 1개 이상 / 8자리 이상 16자 이하
        //      - 비밀번호 확인 : 비밀번호와 동일해야 함

        //      * 일치하지 않을 경우 input의 아래 부분에 텍스트 출력(keyup 이벤트 활용)
        //          - 이름이 일치하지 않을 경우 : "한글만 사용 가능합니다."    // 색상 red
        //          - 이름이 일치할 경우 : ""   (빈 문자열 출력)
        
            
            if(!namePattern.test(name)){
                nameMsg.textContent = "한글만 사용 가능합니다.";
                nameMsg.style.color = "red";
            } else {
                nameMsg.textContent = "";
            }
        
            
        

        //      - 아이디가 일치하지 않을 경우 : "5~20자의 영문 소문자, 숫자와 특수기호(_),(-)만 사용 가능합니다."    // 색상 red
        //      - 아이디가 일치할 경우 : "사용 가능한 아이디입니다."    // 색상 green
            if(!idPattern.test(id)){
                idMsg.textContent ="5~20자의 영문 소문자, 숫자와 특수기호(_),(-)만 사용 가능합니다.";
                idMsg.style.color = "red";
            } else{
                idMsg.textContent ="사용 가능한 아이디입니다.";
                idMsg.style.color = "green";
            }

        //      - 비밀번호가 일치하지 않을 경우 : "8~16자의 영문 대/소문자, 숫자, 특수문자를 사용해 주세요."    // 색상 red
        //      - 비밀번호가 일치할 경우 : "사용 가능한 비밀번호입니다."    // 색상 green

        //      - 비밀번호 확인이 비밀번호와 일치하지 않을 경우 : 비밀번호가 일치하지 않습니다."    // 색상 red
        //      - 비밀번호 확인이 비밀번화 일치할 경우 : "비밀번호가 일치합니다."    // 색상 green
            if(!pwPattern.test(pw)){
                pwMsg.textContent = "8~16자의 영문 대/소문자, 숫자, 특수문자를 사용해 주세요.";
                pwMsg.style.color = "red";
            } else {
                pwMsg.textContent = "사용 가능한 비밀번호입니다.";
                pwMsg.style.color = "green";
            }

            if (pw !== pw2){
                console.log("aaa")
                pw2Msg.textContent = "비밀번호가 일치하지 않습니다."
                pw2Msg.style.color = "red";
            } else {
                console.log("aaa")
                pw2Msg.textContent = "비밀번호가 일치합니다."
                pw2Msg.style.color = "green";
            }

        //      * 공통 : 비어있는 문자 불가(회원 가입 버튼 클릭 시) 
        //          - 비어있다면 alert "이름을 입력해주세요."
        //          - 아이디가 비어있다면 alert "아이디를 입력해주세요."
        //          - 비밀번호가 비어있다면 alert "비밀번호를 입력해주세요."
        //          - 비밀번호 확인이 일치하지 않는다면 alert "비밀번호가 일치하지 않습니다"
            if(name === ""){
                alert("이름을 입력해주세요.")
                return;
            } 
            if(id === ""){
                alert(" 아이디를 입력해주세요.")
                return;
            } 
            if(pw === ""){
                alert("비밀번호 입력해주세요.")
                return;
            } 
            if(pw2 === ""){
                alert("비밀번호가 일치하지 않습니다.")
                return;
            } 
            

	    //	    * 공통 : 모든 유효성 검사가 통과해야 회원가입 버튼 클릭 시 "회원가입이 완료되었습니다" alert 출력
	    // 		    - 유효성 검사가 1개라도 실패했다면 "입력값을 다시 확인해주세요." alert 출력

            if(namePattern.test(name)== true && idPattern.test(id) == true && pwPattern.test(pw) == true && pw == pw2){
                alert("회원가입이 완료되었습니다")
            } else{
                alert("입력값을 다시 확인해주세요")
            }

}
        function keyboardFunc(){

            const name = document.getElementById('join-name').value;
            const nameMsg = document.getElementById('msg-name');
            const namePattern = /^[ㄱ-ㅎ가-힣]+$/;

            if (name === "") {
            nameMsg.textContent = "";
            } else if(!namePattern.test(name)){
                nameMsg.textContent = "한글만 사용 가능합니다.";
                nameMsg.style.color = "red";
            } else {
                nameMsg.textContent = "";
            }
        }

        function Countmsg(){
            const text = document.getElementById('contact-msg').value;
            const countspan = document.getElementById('msg-count')

            countspan.textContent = text.length;
        }


    </script>
